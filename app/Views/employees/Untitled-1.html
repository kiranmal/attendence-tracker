          <label>Employee ID</label>
          <span> <?= htmlspecialchars($_SESSION['employee_id']) ?> </span>
        </div>

      <div class="actions">
        <button id="checkInBtn" class="checkin-btn">📍 Check In</button>

        <button id="checkOutBtn" class="checkout-btn">🚪 Check Out</button>

        <a href="../attendence/my_attendance.php" class="attendance-btn">
          📅 My Attendance
        </a>
      </div>

      <div id="message"></div>

      <div class="footer">PCL Attendance System</div>
    </div>

    <script>
      // Prevent form/page resubmission after refresh
      if (window.history.replaceState) {
        window.history.replaceState(null, null, window.location.href);
      }
      document
        .getElementById("checkInBtn")
        .addEventListener("click", function () {
          const message = document.getElementById("message");

          message.style.display = "block";
          message.style.background = "#dbeafe";
          message.style.color = "#1e40af";
          message.innerHTML = "📍 Detecting your location...";
          navigator.geolocation.getCurrentPosition(
            function (position) {
              const formData = new FormData();

              formData.append("latitude", position.coords.latitude);

              formData.append("longitude", position.coords.longitude);

              message.innerHTML = "⏳ Marking attendance...";

              fetch("/pcl_attendence_sheet/public/employee/checkin.php", {
                method: "POST",
                body: formData,
              })
                .then((response) => response.text())
                .then((data) => {
                  message.style.background = "#dcfce7";

                  message.style.color = "#166534";

                  message.innerHTML = data;
                });
            },

            function (error) {
              message.style.display = "block";

              message.style.background = "#fee2e2";

              message.style.color = "#991b1b";

              message.innerHTML = "Location permission denied.";
            },

            {
              enableHighAccuracy: true,
            },
          );
        });
      document
        .getElementById("checkOutBtn")
        .addEventListener("click", function () {
          const message = document.getElementById("message");

          message.style.display = "block";
          message.style.background = "#dbeafe";
          message.style.color = "#1e40af";
          message.innerHTML = "⏳ Processing checkout...";

          const formData = new FormData();

          fetch("/pcl_attendence_sheet/public/employee/checkout.php", {
            method: "POST",
            body: formData,
          })
            .then((response) => response.text())
            .then((data) => {
              message.style.background = "#dcfce7";
              message.style.color = "#166534";
              message.innerHTML = data;
            })
            .catch((error) => {
              message.style.background = "#fee2e2";
              message.style.color = "#991b1b";
              message.innerHTML = "Checkout failed.";
            });
        });
    </script>
